# Server configuration
server.port=8080
spring.web.error.include-message=always

# AI Configuration
ai.ollama.url=http://localhost:11434
ai.ollama.model=phi3
ai.ollama.api.generate=/api/generate

# Logging configuration
logging.level.com.ai.chatbot=DEBUG
logging.level.org.springframework.web=INFO
logging.file.path=logs
logging.file.name=logs/chatbot-application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Rest Template configuration
spring.http.client.connect-timeout=30000
spring.http.client.read-timeout=60000